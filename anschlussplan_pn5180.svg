<rect x="760" y="98"  width="40" height="16" rx="3" fill="#14532d" stroke="#ef4444"/><text x="780" y="110" text-anchor="middle" font-size="9" fill="#ef4444">3.3V</text><text x="804" y="110" text-anchor="start" font-size="9" fill="#94a3b8">Logik</text>

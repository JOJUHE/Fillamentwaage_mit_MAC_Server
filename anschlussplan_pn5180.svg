<!-- VERBINDER: HX711 VCC = 3V3 ESP links -->
<polyline points="80,82 80,44 282,44 282,101 330,101" fill="none" stroke="#ef4444" stroke-width="1.8" marker-end="url(#ar_r)"/>
<!-- VERBINDER: HX711 GND = GND ESP links -->
<polyline points="60,119 54,119 54,40 287,40 287,125 330,125" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<!-- VERBINDER: HX711 DT = IO4 -->
<polyline points="60,140 46,140 46,355 200,355 200,197 330,197" fill="none" stroke="#4ade80" stroke-width="1.8" marker-end="url(#ar_g)"/>
<!-- VERBINDER: HX711 SCK = IO5 -->
<polyline points="60,161 41,161 41,364 195,364 195,221 330,221" fill="none" stroke="#86efac" stroke-width="1.8" stroke-dasharray="7,3" marker-end="url(#ar_g)"/>

<!-- VERBINDER: Buzzer Signal = IO2 -->
<polyline points="62,428 35,428 35,375 185,375 185,173 330,173" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#ar_o)"/>
<!-- VERBINDER: Buzzer GND = GND links -->
<polyline points="120,428 120,455 308,455 308,374 330,374" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- VERBINDER: PN5180 3.3V = ESP 3V3 rechts -->
<polyline points="760,106 625,106 625,364 560,364" fill="none" stroke="#ef4444" stroke-width="1.8" marker-end="url(#ar_r)"/>
<!-- VERBINDER: PN5180 5V = ESP 5V links (Antenne!) -->
<polyline points="760,127 618,127 618,36 284,36 284,149 330,149" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#ar_r5)"/>
<!-- VERBINDER: PN5180 GND = ESP GND rechts -->
<polyline points="760,148 630,148 630,388 560,388" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<!-- VERBINDER: PN5180 NSS = IO10 -->
<polyline points="760,169 715,169 715,101 560,101" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#ar_c)"/>
<!-- VERBINDER: PN5180 MOSI = IO35 -->
<polyline points="760,190 720,190 720,125 560,125" fill="none" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#ar_b)"/>
<!-- VERBINDER: PN5180 SCK = IO36 -->
<polyline points="760,211 725,211 725,149 560,149" fill="none" stroke="#facc15" stroke-width="1.8" marker-end="url(#ar_y)"/>
<!-- VERBINDER: PN5180 MISO = IO37 -->
<polyline points="760,232 730,232 730,173 560,173" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#ar_o)"/>
<!-- VERBINDER: PN5180 BUSY = IO38 -->
<polyline points="760,253 735,253 735,197 560,197" fill="none" stroke="#c084fc" stroke-width="1.8" marker-end="url(#ar_p)"/>
<!-- VERBINDER: PN5180 RST = IO39 -->
<polyline points="760,274 740,274 740,221 560,221" fill="none" stroke="#f472b6" stroke-width="1.8" marker-end="url(#ar_pk)"/>


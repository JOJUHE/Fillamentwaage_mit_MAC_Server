<text x="52"  y="531" font-size="10" font-weight="bold" fill="#4ade80">HX711</text>
<text x="52"  y="545" font-size="9" fill="#94a3b8">VCC  - 3.3V (ESP links)</text>
<text x="52"  y="558" font-size="9" fill="#94a3b8">GND  - GND</text>
<text x="52"  y="571" font-size="9" fill="#94a3b8">DT   - GPIO 4</text>
<text x="52"  y="584" font-size="9" fill="#94a3b8">SCK  - GPIO 5</text>
<text x="52"  y="600" font-size="9" fill="#78716c">Waegezelle: 4 Kabel</text>
<text x="52"  y="612" font-size="9" fill="#78716c">direkt an HX711 Klemmen</text>

<text x="232" y="531" font-size="10" font-weight="bold" fill="#4ade80">PN5180 (SPI + ISO 15693)</text>
<text x="232" y="545" font-size="9" fill="#94a3b8">3.3V - 3.3V  (Logik)</text>
<text x="232" y="558" font-size="9" fill="#f97316">5V   - 5V   (HF-Antenne!)</text>
<text x="232" y="571" font-size="9" fill="#94a3b8">GND  - GND</text>
<text x="232" y="584" font-size="9" fill="#94a3b8">NSS  - GPIO 10  (CS)</text>
<text x="232" y="597" font-size="9" fill="#94a3b8">MOSI - GPIO 35</text>
<text x="232" y="610" font-size="9" fill="#94a3b8">SCK  - GPIO 36</text>
<text x="232" y="623" font-size="9" fill="#94a3b8">MISO - GPIO 37</text>
<text x="232" y="636" font-size="9" fill="#94a3b8">BUSY - GPIO 38</text>
<text x="232" y="649" font-size="9" fill="#94a3b8">RST  - GPIO 39</text>

<text x="452" y="531" font-size="10" font-weight="bold" fill="#fb923c">Sonstiges</text>
<text x="452" y="545" font-size="9" fill="#fb923c">Buzzer Signal - GPIO 2</text>
<text x="452" y="558" font-size="9" fill="#94a3b8">Buzzer GND   - GND</text>
<text x="452" y="574" font-size="9" fill="#94a3b8">DFPlayer TX  - GPIO 16</text>
<text x="452" y="587" font-size="9" fill="#94a3b8">DFPlayer RX  - GPIO 17</text>
<text x="452" y="600" font-size="9" fill="#94a3b8">DFPlayer VCC - 5V</text>
<text x="452" y="613" font-size="9" fill="#94a3b8">DFPlayer GND - GND</text>

<text x="660" y="531" font-size="10" font-weight="bold" fill="#22c55e">OpenPrintTag Tags</text>
<text x="660" y="545" font-size="9" fill="#94a3b8">NXP ICODE SLIX  (112 Byte)</text>
<text x="660" y="558" font-size="9" fill="#94a3b8">NXP ICODE SLIX2 (320 Byte)</text>
<text x="660" y="574" font-size="9" fill="#f87171">Kein MIFARE / NTAG!</text>
<text x="660" y="590" font-size="9" fill="#78716c">Leseabstand: bis 20cm</text>
<text x="660" y="606" font-size="9" fill="#64748b">Format: CBOR in NDEF</text>
<text x="660" y="622" font-size="9" fill="#64748b">MIME: application/vnd</text>
<text x="660" y="634" font-size="9" fill="#64748b">     .openprinttag</text>


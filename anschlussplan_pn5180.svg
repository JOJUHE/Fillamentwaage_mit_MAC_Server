<text x="102" y="302" text-anchor="middle" font-size="8" fill="#78716c">rot / blau / gruen / weiss</text>
<text x="102" y="315" text-anchor="middle" font-size="8" fill="#78716c">4 Kabel direkt zu HX711</text>


<rect x="760" y="203" width="40" height="16" rx="3" fill="#14532d" stroke="#facc15"/><text x="780" y="215" text-anchor="middle" font-size="9" fill="#facc15">SCK</text>
<rect x="760" y="224" width="40" height="16" rx="3" fill="#14532d" stroke="#fb923c"/><text x="780" y="236" text-anchor="middle" font-size="9" fill="#fb923c">MISO</text>
